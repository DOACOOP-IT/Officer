/* ===== Webfont: Sarabun ===== */
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap');

/* ============================================================
   DESIGN TOKENS — สหกรณ์ Confirmation Design System
   ============================================================ */
:root {
  /* Paper / background ramp */
  --paper-50:#f7f2eb; --paper-100:#f4efe7; --paper-200:#e6ddd2; --paper-300:#d6ddd9;
  /* Pine green (primary) */
  --pine-50:#e5f0ed; --pine-100:#d2e7e0; --pine-500:#25665b; --pine-700:#194940; --pine-900:#163f37;
  /* Terracotta (danger) */
  --clay-50:#f6ebe7; --clay-500:#b05d46;
  /* Ochre (warning) */
  --ochre-50:#f8f1e1; --ochre-500:#b3842c;
  /* Ink ramp */
  --ink-900:#1e2b28; --ink-700:#1b2826; --ink-500:#687571; --white:#ffffff;
  /* Surfaces */
  --surface:rgba(255,251,246,0.82); --surface-strong:#fffdf9; --surface-veil:rgba(255,255,255,0.66);
  /* Hairlines */
  --line:rgba(27,40,38,0.10); --line-strong:rgba(27,40,38,0.18); --line-glass:rgba(255,255,255,0.58);
  /* Semantic aliases */
  --bg:var(--paper-100); --bg-deep:var(--paper-200);
  --text-body:var(--ink-900); --text-muted:var(--ink-500); --text-on-accent:var(--white);
  --surface-card:var(--surface); --surface-inset:var(--surface-strong);
  --accent:var(--pine-500); --accent-strong:var(--pine-700); --accent-soft:var(--pine-50); --accent-soft-2:var(--pine-100);
  --danger:var(--clay-500); --danger-soft:var(--clay-50);
  --warning:var(--ochre-500); --warning-soft:var(--ochre-50);
  --success:var(--pine-500); --success-soft:var(--pine-50);
  --border:var(--line); --border-strong:var(--line-strong);

  /* Elevation */
  --shadow:0 24px 50px rgba(29,44,39,0.10);
  --shadow-soft:0 12px 28px rgba(29,44,39,0.06);
  --shadow-accent:0 14px 26px rgba(37,102,91,0.22);
  --shadow-accent-hover:0 18px 30px rgba(37,102,91,0.28);
  --inset-top:inset 0 1px 0 rgba(255,255,255,0.75);
  /* Glass */
  --blur-glass:20px; --blur-veil:12px;
  /* Focus ring */
  --ring:0 0 0 5px rgba(37,102,91,0.08); --ring-border:rgba(37,102,91,0.35);
  /* Brand gradients */
  --grad-accent:linear-gradient(135deg,#25665b 0%,#194940 100%);
  --grad-logo:linear-gradient(145deg,rgba(37,102,91,0.12),rgba(255,255,255,0.72));
  --grad-tint-pine:linear-gradient(135deg,rgba(37,102,91,0.12),rgba(255,255,255,0.84));
  --grad-tint-clay:linear-gradient(135deg,rgba(176,93,70,0.14),rgba(255,255,255,0.92));
  /* Ambient app background */
  --app-background:
    radial-gradient(circle at top left,rgba(37,102,91,0.14),transparent 24%),
    radial-gradient(circle at top right,rgba(176,93,70,0.12),transparent 22%),
    linear-gradient(180deg,#f7f2eb 0%,#f4efe7 44%,#e6ddd2 100%);
  --app-mesh:
    linear-gradient(rgba(255,255,255,0.18) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.18) 1px,transparent 1px);
  --app-mesh-size:34px 34px;
  /* Motion */
  --ease:cubic-bezier(0.4,0,0.2,1); --dur:0.24s; --lift:translateY(-2px);
  --transition-base:transform var(--dur) var(--ease),box-shadow var(--dur) var(--ease),background var(--dur) var(--ease),border-color var(--dur) var(--ease);

  /* Typography */
  --font-ui:"Sarabun","Noto Sans Thai",system-ui,sans-serif;
  --font-doc:"Sarabun","TH Sarabun New",Tahoma,sans-serif;
  --font-num:"Sarabun","Noto Sans Thai",sans-serif;
  --fw-light:300; --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700; --fw-black:800;
  --text-hero:clamp(2rem,5vw,3.5rem); --text-display:clamp(1.9rem,4vw,3.1rem);
  --text-title:clamp(1.9rem,3vw,2.6rem); --text-h2:2rem; --text-h3:1.45rem;
  --text-stat:clamp(1.4rem,3vw,2.25rem);
  --text-lg:1.08rem; --text-base:1rem; --text-sm:0.92rem; --text-xs:0.88rem; --text-2xs:0.78rem;
  --leading-tight:1.08; --leading-snug:1.2; --leading-normal:1.55; --leading-relaxed:1.75;
  --tracking-hero:-0.04em; --tracking-tight:-0.03em; --tracking-snug:-0.02em; --tracking-eyebrow:0.08em;

  /* Spacing & radii */
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:18px;
  --space-6:22px; --space-7:28px; --space-8:34px; --space-9:44px; --space-10:56px;
  --pad-card:30px; --pad-panel:22px; --pad-chip:9px 14px; --pad-button:14px 20px;
  --width-portal:1220px; --width-dashboard:1320px; --width-form:700px; --width-auth:450px;
  --radius-xl:28px; --radius-lg:22px; --radius-md:16px; --radius-sm:12px; --radius-pill:999px;
}

/* ============================================================
   BASE
   ============================================================ */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font-ui);color:var(--text-body);
  background:var(--app-background);background-attachment:fixed;min-height:100vh;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
body::before{
  content:"";position:fixed;inset:0;z-index:0;
  background-image:var(--app-mesh);background-size:var(--app-mesh-size);
  -webkit-mask-image:linear-gradient(180deg,#000 0%,#000 38%,transparent 86%);
  mask-image:linear-gradient(180deg,#000 0%,#000 38%,transparent 86%);
  pointer-events:none;
}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(37,102,91,0.20);border-radius:999px;border:3px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:rgba(37,102,91,0.34);background-clip:padding-box}
input,textarea,select,button{font-family:inherit}
input::placeholder,textarea::placeholder{color:var(--ink-500);opacity:.7}
input:focus,textarea:focus,select:focus{border-color:var(--ring-border)!important;box-shadow:var(--ring)}
@keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes slideToast{from{opacity:0;transform:translateY(-14px) scale(.98)}to{opacity:1;transform:none}}

/* Ambient orbs */
.orb{position:fixed;border-radius:999px;filter:blur(14px);opacity:.6;z-index:0;pointer-events:none}
.orb-tl{top:-180px;left:-160px;width:520px;height:520px;background:radial-gradient(circle,rgba(37,102,91,0.20),transparent 62%)}
.orb-br{bottom:-220px;right:-180px;width:560px;height:560px;background:radial-gradient(circle,rgba(176,93,70,0.18),transparent 62%)}

.hidden{display:none!important}

/* Inputs */
.field{width:100%;border:1px solid var(--border);border-radius:var(--radius-md);padding:15px 16px;font-size:1rem;background:rgba(255,255,255,0.82);outline:none;color:var(--text-body);transition:var(--transition-base)}
textarea.field{resize:vertical;line-height:var(--leading-normal)}
select.field{cursor:pointer}
.label{font-size:.9rem;color:var(--text-muted);font-weight:var(--fw-semibold)}

/* Buttons */
.btn-primary{border:0;border-radius:999px;background:var(--grad-accent);color:#fff;font-weight:var(--fw-bold);cursor:pointer;box-shadow:var(--shadow-accent);transition:var(--transition-base)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:var(--shadow-accent-hover)}
.btn-primary:disabled{cursor:not-allowed;background:var(--paper-300);color:var(--ink-500);box-shadow:none;transform:none}
.btn-ghost{border:1px solid var(--border);background:rgba(255,255,255,0.8);border-radius:999px;cursor:pointer;font-weight:var(--fw-semibold);color:var(--text-body);box-shadow:var(--shadow-soft);transition:var(--transition-base)}
.btn-ghost:hover{background:#fff}

/* Glass card */
.glass{background:var(--surface);backdrop-filter:blur(var(--blur-glass));-webkit-backdrop-filter:blur(var(--blur-glass));border:1px solid var(--line-glass);border-radius:var(--radius-xl);box-shadow:var(--shadow)}
.eyebrow{font-size:.72rem;letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;color:var(--accent);font-weight:var(--fw-bold)}

/* Layout */
#app{position:relative;z-index:1}
.shell{display:flex;align-items:flex-start;min-height:100vh}
aside.sidebar{position:sticky;top:0;align-self:flex-start;width:264px;flex:0 0 264px;height:100vh;overflow-y:auto;padding:26px 18px;display:flex;flex-direction:column;gap:22px;border-right:1px solid var(--line)}
main.content{flex:1;min-width:0;max-width:1360px;padding:24px 36px 40px}
.nav-btn{display:flex;align-items:center;gap:12px;width:100%;text-align:left;border-radius:var(--radius-md);padding:12px 14px;cursor:pointer;font-size:.96rem;font-weight:var(--fw-semibold);transition:var(--transition-base)}
.nav-head{font-size:.7rem;letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;color:var(--ink-500);font-weight:var(--fw-semibold);padding:6px 14px 4px}

/* Mobile top bar + drawer */
.mobile-topbar{display:none}
.nav-backdrop{display:none}

@media (max-width:860px){
  aside.sidebar{position:fixed;left:0;top:0;height:100vh;width:262px;flex:0 0 262px;z-index:80;background:var(--paper-50);transform:translateX(-100%);transition:transform .26s var(--ease)}
  aside.sidebar.open{transform:none;box-shadow:0 20px 60px rgba(29,44,39,0.34)}
  .nav-backdrop.show{display:block;position:fixed;inset:0;background:rgba(29,44,39,0.4);z-index:75}
  .mobile-topbar{display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:60;padding:10px 12px;background:var(--surface-strong);border-bottom:1px solid var(--line);box-shadow:var(--shadow-soft)}
  main.content{padding:12px 12px 28px}
  .page-header{margin-bottom:14px !important}
  .page-header h1{font-size:1.4rem !important}
  .page-header p{font-size:.9rem !important}
  .statgrid{grid-template-columns:1fr 1fr !important;gap:12px !important}
  .detailgrid{grid-template-columns:1fr !important;gap:16px !important}
  .detailgrid > div:last-child{position:static !important}
  .glass{border-radius:var(--radius-lg)}
  section .glass{padding:18px 16px !important}
}
@media (max-width:480px){
  .statgrid{grid-template-columns:1fr !important}
}

function _apiPayload(action, args){
  switch (action){

function _apiCall(action, args, onOk, onErr){
  fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: action, payload: _apiPayload(action, args) })

/* ============================================================
   QR matrix (deterministic from device id) — drawn with divs
   ============================================================ */
function buildMatrix(seed){
  var h = 0, i;
  for (i = 0; i < seed.length; i++) h = (h * 131 + seed.charCodeAt(i)) >>> 0;
  var rnd = function(){ h = (h * 1103515245 + 12345) & 0x7fffffff; return h / 0x7fffffff; };
  var N = 13, dark = '#163f37';
  var g = [], r, c;
  for (r = 0; r < N; r++){ g.push([]); for (c = 0; c < N; c++) g[r].push(0); }
  var finder = function(r0, c0){
    for (var rr = 0; rr < 5; rr++) for (var cc = 0; cc < 5; cc++){
      var edge = rr === 0 || rr === 4 || cc === 0 || cc === 4;
      g[r0+rr][c0+cc] = (edge || (rr === 2 && cc === 2)) ? 1 : 0;
    }
  };
  finder(0,0); finder(0,N-5); finder(N-5,0);
  var inF = function(r,c){ return (r<5&&c<5)||(r<5&&c>=N-5)||(r>=N-5&&c<5); };
  for (r = 0; r < N; r++) for (c = 0; c < N; c++) if (!inF(r,c)) g[r][c] = rnd() > 0.52 ? 1 : 0;
  var html = '';
  for (r = 0; r < N; r++) for (c = 0; c < N; c++)
    html += '<div style="background:' + (g[r][c] ? dark : 'transparent') + '"></div>';
  return html;
}

/* ============================================================
   LINE CHART (inline SVG, no library)
   ============================================================ */
function lineChart(height){
  var w = 760, h = height || 260, padL = 36, padR = 18, padT = 18, padB = 30;
  var vals = TREND.map(function(t){ return t.v; });
  var max = Math.max.apply(null, vals) * 1.15, min = 0;
  var iw = w - padL - padR, ih = h - padT - padB;
  var xAt = function(i){ return padL + (iw * i / (TREND.length - 1)); };
  var yAt = function(v){ return padT + ih - ((v - min) / (max - min)) * ih; };
  var pts = TREND.map(function(t, i){ return xAt(i) + ',' + yAt(t.v); });
  var line = 'M' + pts.join(' L');
  var area = line + ' L' + xAt(TREND.length-1) + ',' + (padT+ih) + ' L' + xAt(0) + ',' + (padT+ih) + ' Z';
  var grid = '', g, gy, gv;
  for (g = 0; g <= 4; g++){
    gv = max * g / 4; gy = yAt(gv);
    grid += '<line x1="'+padL+'" y1="'+gy+'" x2="'+(w-padR)+'" y2="'+gy+'" stroke="rgba(27,40,38,0.07)" stroke-width="1"/>';
    grid += '<text x="'+(padL-8)+'" y="'+(gy+4)+'" text-anchor="end" font-size="11" fill="var(--ink-500)">'+Math.round(gv)+'</text>';
  }
  var dots = '', labels = '';
  TREND.forEach(function(t, i){
    dots += '<circle cx="'+xAt(i)+'" cy="'+yAt(t.v)+'" r="4.5" fill="#fff" stroke="var(--accent)" stroke-width="2.5"/>';
    labels += '<text x="'+xAt(i)+'" y="'+(h-9)+'" text-anchor="middle" font-size="12" fill="var(--ink-500)">'+t.m+'</text>';
  });
  return '<svg viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'" preserveAspectRatio="xMidYMid meet" style="display:block">'
    + '<defs><linearGradient id="lcArea" x1="0" y1="0" x2="0" y2="1">'
    + '<stop offset="0%" stop-color="rgba(37,102,91,0.22)"/><stop offset="100%" stop-color="rgba(37,102,91,0)"/></linearGradient></defs>'
    + grid
    + '<path d="'+area+'" fill="url(#lcArea)"/>'
    + '<path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>'
    + dots + labels + '</svg>';
}

  +   '</div>'
  + '</div></div></section>';

function pickCategory(k){ setState({ category:k }); }
function refreshReportSubmit(){
  var can = !!S.category && S.desc.trim().length > 0;
  var btn = document.getElementById('report-submit'), hint = document.getElementById('report-hint');
  if (btn) btn.disabled = !can;
  if (hint) hint.textContent = can ? 'พร้อมส่งข้อมูลแล้ว' : 'เลือกประเภทงานและกรอกรายละเอียดก่อนส่ง';
}
function addPhoto(){ setState({ attach: Math.min(S.attach + 1, 4) }); }
function clearQr(){ setState({ qrShow:false }); }
function submitReport(){
  if (!(S.desc.trim() && S.category)) return;
  var assetId = S.scanAssetInfo ? S.scanAssetInfo.id : (S.qrShow ? 'NB-00742' : '');
  var place   = S.scanAssetInfo ? S.scanAssetInfo.location : '';
  var payload = { category:S.category, desc:S.desc.trim(), asset_id:assetId, place:place, attach:S.attach,
                  requester_id:S.lineUserId, requester_name:S.displayName };
  if (hasBackend()){
    google.script.run
      .withSuccessHandler(function(res){
        toastMsg('เปิดงานซ่อมแล้ว • หมายเลขงาน ' + (res && res.id ? res.id : '') + ' บันทึกลง Google Sheet แล้ว');
        setState({ category:'', desc:'', attach:0 });
        refreshTickets();
      })
      .withFailureHandler(function(){ toastMsg('บันทึกงานซ่อมไม่สำเร็จ กรุณาลองใหม่'); })
      .createTicket(payload);
  } else {
    toastMsg('เปิดงานซ่อมแล้ว • หมายเลขงาน JOB-2569-0143 (โหมดสาธิต)');
  }
}

/* Re-pull tickets after a write so lists stay in sync with the Sheet. */
function refreshTickets(){
  if (!hasBackend()) return;
  google.script.run.withSuccessHandler(function(data){
    S.ticketsRaw = (data && data.tickets) || S.ticketsRaw;
    S.loanRaw = (data && data.loans) || S.loanRaw;
    render();
  }).getBootData();
}

   ============================================================ */
function filteredTickets(){
  var all = allTickets();
  return S.ticketFilter === 'all' ? all : all.filter(function(t){ return t.statusKey === S.ticketFilter; });
}

function viewTickets(){
  var all = allTickets();
  var cnt = function(k){ return all.filter(function(t){ return t.statusKey === k; }).length; };
  var tabs = [['all','ทั้งหมด',all.length],['pending','รอรับงาน',cnt('pending')],['inprogress','กำลังซ่อม',cnt('inprogress')],['outsourced','ส่งบริษัทแล้ว',cnt('outsourced')],['resolved','ปิดงานแล้ว',cnt('resolved')]];
  var tabsHtml = tabs.map(function(t){
    var on = S.ticketFilter === t[0];
    var bg = on ? 'var(--grad-tint-pine)' : 'rgba(255,255,255,0.7)';
    var fg = on ? 'var(--accent-strong)' : 'var(--text-muted)';
    var bd = on ? 'rgba(37,102,91,0.22)' : 'var(--border)';
    var sh = on ? 'var(--shadow-soft)' : 'none';
    return '<button onclick="setFilter(\''+t[0]+'\')" style="border:1px solid '+bd+';background:'+bg+';color:'+fg+';box-shadow:'+sh+';border-radius:999px;padding:10px 18px;cursor:pointer;font-weight:var(--fw-semibold);font-size:.9rem;display:inline-flex;align-items:center;gap:9px;transition:var(--transition-base)">'
      + esc(t[1]) + '<span style="background:rgba(27,40,38,0.08);border-radius:999px;padding:1px 9px;font-size:.78rem;font-weight:var(--fw-bold)">'+t[2]+'</span></button>';
  }).join('');

  var rows = filteredTickets().map(function(t){
    return '<div onclick="openTicket(\''+t.id+'\')" style="display:grid;grid-template-columns:1.2fr 1.7fr 1fr 1.15fr 1.1fr 0.95fr;gap:12px;align-items:center;padding:15px 14px;border-bottom:1px solid var(--line);font-size:.9rem;cursor:pointer;border-radius:12px;transition:var(--transition-base)" onmouseover="this.style.background=\'var(--accent-soft)\'" onmouseout="this.style.background=\'transparent\'">'
      + '<span style="font-weight:var(--fw-bold);color:var(--accent-strong)">'+esc(t.id)+'</span>'
      + '<span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(t.dev)+'</span>'
      + '<span style="color:var(--text-muted)">'+esc(t.by)+'</span>'
      + '<span style="color:var(--text-muted)">'+esc(t.tech)+'</span>'
      + '<span style="color:'+t.slaColor+';font-weight:var(--fw-semibold);font-size:.85rem">'+esc(t.sla)+'</span>'
      + '<span style="justify-self:end;display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;font-size:.8rem;font-weight:var(--fw-bold);background:'+t.bg+';color:'+t.fg+';border:1px solid '+t.bd+';white-space:nowrap"><span style="width:7px;height:7px;border-radius:999px;background:currentColor;opacity:.7"></span>'+esc(t.status)+'</span></div>';
  }).join('');

  return '<section style="animation:riseIn .6s var(--ease) both">'
  + '<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center">'+tabsHtml
  +   '<div style="margin-left:auto;display:flex;gap:8px">'
  +     '<button class="btn-primary" style="padding:10px 20px;font-size:.9rem" onclick="exportPdf()">พิมพ์ PDF</button>'
  +     '<button class="btn-ghost" style="padding:10px 20px;font-size:.9rem" onclick="exportCsv()">ส่งออก CSV</button>'
  +   '</div></div>'
  + '<div class="glass" style="padding:24px 26px"><div style="overflow-x:auto"><div style="min-width:840px">'
  +   '<div style="display:grid;grid-template-columns:1.2fr 1.7fr 1fr 1.15fr 1.1fr 0.95fr;gap:12px;padding:0 14px 12px;font-size:.78rem;color:var(--text-muted);font-weight:var(--fw-semibold);border-bottom:1px solid var(--line)"><span>หมายเลขงาน</span><span>อุปกรณ์</span><span>ผู้แจ้ง</span><span>ช่างผู้รับผิดชอบ</span><span>SLA</span><span style="text-align:right">สถานะ</span></div>'
  +   rows
  + '</div></div></div></section>';
}

function setFilter(k){ setState({ ticketFilter:k }); }
function openTicket(id){ setState({ screen:'detail', activeTicketId:id }); window.scrollTo(0,0); }

function exportCsv(){
  var rows = filteredTickets();
  var head = ['หมายเลขงาน','อุปกรณ์','ผู้แจ้ง','ช่างผู้รับผิดชอบ','SLA','สถานะ'];
  var escc = function(v){ return '"' + String(v).replace(/"/g,'""') + '"'; };
  var csv = [head].concat(rows.map(function(t){ return [t.id,t.dev,t.by,t.tech,t.sla,t.status]; }))
    .map(function(r){ return r.map(escc).join(','); }).join('\r\n');
  var blob = new Blob(['﻿'+csv], { type:'text/csv;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href = url; a.download = 'รายการงานซ่อม.csv';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
  toastMsg('ส่งออกไฟล์ CSV ('+rows.length+' รายการ) เรียบร้อยแล้ว');
}

function exportPdf(){
  var rows = filteredTickets();
  var escp = function(v){ return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
  var trs = rows.map(function(t,i){
    return '<tr><td>'+(i+1)+'</td><td>'+escp(t.id)+'</td><td class="l">'+escp(t.dev)+'</td><td>'+escp(t.by)+'</td><td>'+escp(t.tech)+'</td><td>'+escp(t.sla)+'</td><td>'+escp(t.status)+'</td></tr>';
  }).join('');
  var html = '<!doctype html><html lang="th"><head><meta charset="utf-8"><title>รายการงานซ่อม IT</title>'
    + '<style>@import url("https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap");'
    + '*{font-family:\'Sarabun\',sans-serif;box-sizing:border-box}body{margin:38px;color:#1e2b28}'
    + 'h1{font-size:20px;margin:0;font-weight:800}.sub{color:#687571;font-size:13px}'
    + '.head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #25665b;padding-bottom:12px;margin-bottom:18px}'
    + '.brand{display:flex;gap:12px;align-items:center}.logo{width:44px;height:44px;border-radius:11px;background:#25665b;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}'
    + 'table{width:100%;border-collapse:collapse;font-size:12px}th,td{border:1px solid #d6ddd9;padding:8px 10px;text-align:center}'
    + 'th{background:#e5f0ed;color:#194940;font-weight:700}td.l,th.l{text-align:left}.foot{margin-top:18px;font-size:11px;color:#687571}'
    + '@media print{body{margin:14mm}}</style></head><body>'
    + '<div class="head"><div class="brand"><div class="logo">IT</div><div><h1>รายการงานซ่อม IT</h1>'
    + '<div class="sub">สอ.กรมวิชาการเกษตร จำกัด · '+rows.length+' รายการ</div></div></div>'
    + '<div class="sub">พิมพ์เมื่อ 22 มิ.ย. 2569</div></div>'
    + '<table><thead><tr><th>#</th><th>หมายเลขงาน</th><th class="l">อุปกรณ์</th><th>ผู้แจ้ง</th><th>ช่าง</th><th>SLA</th><th>สถานะ</th></tr></thead><tbody>'
    + trs + '</tbody></table><div class="foot">เอกสารนี้สร้างจากระบบแจ้งซ่อม IT โดยอัตโนมัติ</div></body></html>';
  var w = window.open('', '_blank');
  if (!w){ toastMsg('กรุณาอนุญาต pop-up เพื่อพิมพ์ PDF'); return; }
  w.document.open(); w.document.write(html); w.document.close();
  setTimeout(function(){ try { w.focus(); w.print(); } catch(e){} }, 500);
  toastMsg('เปิดหน้าพิมพ์ PDF ('+rows.length+' รายการ) แล้ว — เลือก "บันทึกเป็น PDF"');
}

function addComment(){
  var t = S.commentDraft.trim(); if (!t) return;
  setState(function(s){ return { comments: s.comments.concat([{ who:'เจ้าหน้าที่ IT', when:'ตอนนี้', text:t, tone:'me' }]), commentDraft:'' }; });
}

/* ============================================================
   LOANS
   ============================================================ */
function viewLoans(){
  var seg = function(on){ return on
    ? 'background:var(--grad-accent);color:var(--text-on-accent);box-shadow:var(--shadow-accent)'
    : 'background:transparent;color:var(--text-muted);box-shadow:none'; };
  var canSubmit = !!(S.loanDevice && S.loanFrom && S.loanTo);

  var tabs = '<div style="display:flex;width:max-content;gap:4px;padding:4px;background:var(--surface-veil);border:1px solid var(--line);border-radius:999px;box-shadow:var(--shadow-soft);margin:0 auto 22px">'
    + '<button onclick="setLoanTab(\'new\')" style="border:0;border-radius:999px;padding:10px 20px;cursor:pointer;font-weight:var(--fw-semibold);font-size:.9rem;transition:var(--transition-base);'+seg(S.loanTab==='new')+'">ขอยืมใหม่</button>'
    + '<button onclick="setLoanTab(\'history\')" style="border:0;border-radius:999px;padding:10px 20px;cursor:pointer;font-weight:var(--fw-semibold);font-size:.9rem;transition:var(--transition-base);'+seg(S.loanTab==='history')+'">ประวัติการยืม</button></div>';

  var body;
  if (S.loanTab === 'new'){
    var opts = '<option value="">— เลือกอุปกรณ์ที่ว่าง —</option>' + FREE_DEVICES.map(function(d){
      return '<option value="'+esc(d.id)+'"'+(S.loanDevice===d.id?' selected':'')+'>'+esc(d.label)+'</option>'; }).join('');
    body = '<div class="glass" style="max-width:640px;margin:0 auto;padding:30px 32px;display:flex;flex-direction:column;gap:22px">'
      + '<div style="display:grid;gap:8px"><label class="label">อุปกรณ์ที่ว่าง</label><select class="field" onchange="S.loanDevice=this.value;refreshLoanSubmit()">'+opts+'</select></div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'
      +   '<div style="display:grid;gap:8px"><label class="label">วันที่ยืม</label><input class="field" type="date" value="'+esc(S.loanFrom)+'" onchange="S.loanFrom=this.value;refreshLoanSubmit()"></div>'
      +   '<div style="display:grid;gap:8px"><label class="label">กำหนดคืน</label><input class="field" type="date" value="'+esc(S.loanTo)+'" onchange="S.loanTo=this.value;refreshLoanSubmit()"></div>'
      + '</div>'
      + '<div style="border-top:1px solid var(--line);padding-top:18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">'
      +   '<span id="loan-hint" style="font-size:.84rem;color:var(--text-muted)">'+(canSubmit?'พร้อมส่งคำขอยืม':'เลือกอุปกรณ์และระบุวันที่ก่อนส่ง')+'</span>'
      +   '<button id="loan-submit" class="btn-primary" style="font-size:1rem;padding:15px 30px" '+(canSubmit?'':'disabled')+' onclick="submitLoan()">ส่งคำขอยืม</button>'
      + '</div></div>';
  } else {
    var cards = loanHistory().map(function(l){
      return '<div class="glass" style="border-radius:var(--radius-lg);box-shadow:var(--shadow-soft);padding:20px 22px">'
        + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px"><strong style="font-size:1rem;line-height:1.35">'+esc(l.dev)+'</strong>'
        + '<span style="flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;font-size:.78rem;font-weight:var(--fw-bold);background:'+l.bg+';color:'+l.fg+';border:1px solid '+l.bd+';white-space:nowrap"><span style="width:7px;height:7px;border-radius:999px;background:currentColor;opacity:.7"></span>'+esc(l.status)+'</span></div>'
        + '<div style="font-size:.86rem;color:var(--text-muted);display:flex;flex-direction:column;gap:4px"><div>ผู้ยืม: <span style="color:var(--text-body);font-weight:var(--fw-semibold)">'+esc(l.by)+'</span></div><div>ช่วงยืม: '+esc(l.from)+' – '+esc(l.to)+'</div></div></div>';
    }).join('');
    body = '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:840px;margin:0 auto">'+cards+'</div>';
  }

  return '<section style="animation:riseIn .6s var(--ease) both">'+tabs+body+'</section>';
}

function setLoanTab(k){ setState({ loanTab:k }); }
function refreshLoanSubmit(){
  var can = !!(S.loanDevice && S.loanFrom && S.loanTo);
  var btn = document.getElementById('loan-submit'), hint = document.getElementById('loan-hint');
  if (btn) btn.disabled = !can;
  if (hint) hint.textContent = can ? 'พร้อมส่งคำขอยืม' : 'เลือกอุปกรณ์และระบุวันที่ก่อนส่ง';
}
function submitLoan(){
  if (!(S.loanDevice && S.loanFrom && S.loanTo)) return;
  var sel = FREE_DEVICES.filter(function(d){ return d.id === S.loanDevice; })[0];
  var payload = { dev: sel ? sel.label.split(' · ')[1] : S.loanDevice, from:S.loanFrom, to:S.loanTo };
  if (hasBackend()){
    google.script.run
      .withSuccessHandler(function(){
        toastMsg('ส่งคำขอยืมอุปกรณ์แล้ว • บันทึกลง Google Sheet · รออนุมัติ');
        setState({ loanDevice:'', loanFrom:'', loanTo:'', loanTab:'history' });
        refreshTickets();
      })
      .withFailureHandler(function(){ toastMsg('ส่งคำขอยืมไม่สำเร็จ กรุณาลองใหม่'); })
      .submitLoan(payload);
  } else {
    toastMsg('ส่งคำขอยืมอุปกรณ์แล้ว • รออนุมัติจากผู้ดูแลระบบ (โหมดสาธิต)');
  }
}

function openAddDevice(){ setState({ devForm:{ open:true, mode:'add', editId:null, id:'', name:'', error:'' } }); }
function openEditDevice(id){
  var d = S.deviceRegistry.filter(function(x){ return x.id === id; })[0];
  if (!d) return;
  setState({ devForm:{ open:true, mode:'edit', editId:id, id:d.id, name:d.name, error:'' } });
}
function closeDevForm(){ setState(function(s){ var f = s.devForm; f.open = false; return { devForm:f }; }); }
function onDevFormField(key, val){ S.devForm[key] = val; S.devForm.error = ''; }
function saveDevice(){
  var f = S.devForm, id = f.id.trim(), name = f.name.trim();
  if (!id || !name){ setState(function(s){ s.devForm.error = 'กรุณากรอกรหัสและชื่ออุปกรณ์ให้ครบ'; return { devForm:s.devForm }; }); return; }
  var dup = S.deviceRegistry.some(function(d){ return d.id === id && d.id !== f.editId; });
  if (dup){ setState(function(s){ s.devForm.error = 'รหัสอุปกรณ์นี้มีอยู่แล้ว'; return { devForm:s.devForm }; }); return; }
  var reg;
  if (f.mode === 'edit') reg = S.deviceRegistry.map(function(d){ return d.id === f.editId ? { id:id, name:name } : d; });
  else reg = S.deviceRegistry.concat([{ id:id, name:name }]);
  var editId = f.editId, mode = f.mode;
  S.devForm.open = false;
  setState({ deviceRegistry:reg, devForm:S.devForm });
  toastMsg(mode === 'edit' ? ('แก้ไขข้อมูลอุปกรณ์ '+id+' แล้ว') : ('เพิ่มอุปกรณ์ '+id+' เรียบร้อยแล้ว'));
  if (hasBackend())
    google.script.run.withFailureHandler(function(){ toastMsg('บันทึกอุปกรณ์ลง Google Sheet ไม่สำเร็จ'); })
      .saveDevice({ id:id, name:name, editId:(mode === 'edit' ? editId : null) });
}
function deleteDevice(id){
  setState({ deviceRegistry: S.deviceRegistry.filter(function(d){ return d.id !== id; }) });
  toastMsg('ลบอุปกรณ์ '+id+' ออกจากระบบแล้ว');
  if (hasBackend())
    google.script.run.withFailureHandler(function(){ toastMsg('ลบอุปกรณ์จาก Google Sheet ไม่สำเร็จ'); }).deleteDevice(id);
}
function printQr(id){ toastMsg('กำลังสร้างไฟล์ PDF QR สำหรับ '+id+' …'); }
function printAll(){ toastMsg('กำลังสร้างไฟล์ PDF QR ทั้งหมด '+S.deviceRegistry.length+' ชิ้น …'); }

/* ============================================================
   PM CALENDAR (มิถุนายน 2569 / June 2026)
   ============================================================ */
function viewPm(){
  var evTone = { accent:{ c:'var(--accent)', bg:'var(--accent-soft)', fg:'var(--accent-strong)' }, warning:{ c:'var(--warning)', bg:'var(--warning-soft)', fg:'var(--warning)' }, danger:{ c:'var(--danger)', bg:'var(--danger-soft)', fg:'var(--danger)' } };
  var ev = function(label, k){ var t = evTone[k]; return { label:label, c:t.c, bg:t.bg, fg:t.fg }; };
  var pmEvents = { 3:[ev('Switch Cisco 2960','accent')], 6:[ev('UPS APC 3kVA','warning')], 10:[ev('Notebook ชุดที่ 1','accent')], 13:[ev('เครื่องพิมพ์ HP','accent')], 17:[ev('แอร์ห้อง Server','danger')], 20:[ev('จอภาพ ชุด B','accent')], 24:[ev('Firewall FortiGate','warning')], 27:[ev('Notebook ชุดที่ 2','accent')] };
  var dows = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  var lead = 1; // June 1 2026 = Monday (Sun=0)
  var cells = [];
  var i;
  for (i = 0; i < lead; i++) cells.push(null);
  for (var d = 1; d <= 30; d++) cells.push({ day:d, today:d===21, events:pmEvents[d]||[] });
  while (cells.length % 7 !== 0) cells.push(null);

  var cellsHtml = cells.map(function(c){
    if (!c) return '<div style="min-height:100px;border-radius:12px;padding:9px;background:transparent;border:1px solid var(--line)"></div>';
    var bg = c.today ? 'var(--accent-soft)' : 'var(--surface-strong)';
    var dayColor = c.today ? 'var(--accent-strong)' : 'var(--text-body)';
    var evs = c.events.map(function(e){
      return '<div style="display:flex;align-items:center;gap:6px;background:'+e.bg+';color:'+e.fg+';border-radius:8px;padding:4px 7px;font-size:.72rem;font-weight:var(--fw-semibold);line-height:1.25"><span style="width:6px;height:6px;border-radius:999px;background:'+e.c+';flex:0 0 auto"></span><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(e.label)+'</span></div>';
    }).join('');
    return '<div style="min-height:100px;border-radius:12px;padding:9px;background:'+bg+';border:1px solid var(--line)"><div style="font-weight:var(--fw-bold);font-size:.92rem;color:'+dayColor+';margin-bottom:6px">'+c.day+'</div><div style="display:flex;flex-direction:column;gap:5px">'+evs+'</div></div>';
  }).join('');

  var dowsHtml = dows.map(function(x){ return '<div style="text-align:center;font-size:.8rem;font-weight:var(--fw-semibold);color:var(--text-muted);padding:4px 0">'+esc(x)+'</div>'; }).join('');

  return '<section style="animation:riseIn .6s var(--ease) both"><div class="glass" style="padding:26px 28px">'
  + '<div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px">'
  +   '<div style="display:flex;align-items:center;gap:14px"><span style="width:34px;height:34px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;color:var(--ink-500);cursor:pointer">‹</span><h2 style="margin:0;font-size:var(--text-h3);font-weight:var(--fw-black)">มิถุนายน 2569</h2><span style="width:34px;height:34px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;color:var(--ink-500);cursor:pointer">›</span></div>'
  +   '<div style="display:flex;gap:16px;font-size:.82rem;color:var(--text-muted);flex-wrap:wrap"><span style="display:flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:999px;background:var(--accent)"></span>ตามรอบปกติ</span><span style="display:flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:999px;background:var(--warning)"></span>เฝ้าระวัง</span><span style="display:flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:999px;background:var(--danger)"></span>สำคัญ</span></div>'
  + '</div>'
  + '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px">'+dowsHtml+'</div>'
  + '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px">'+cellsHtml+'</div>'
  + '</div></section>';
}

  var sk = t.statusKey;

  if (sk === 'resolved'){
    return '<div class="glass" style="padding:20px 22px">'
      + '<div class="eyebrow" style="margin-bottom:10px">สรุปการซ่อม</div>'
      + '<div style="display:flex;flex-direction:column;gap:8px;font-size:.88rem">'
      + '<div><span style="color:var(--text-muted)">วิธีแก้ไข: </span><span style="font-weight:var(--fw-semibold)">'+esc(t.solution||'—')+'</span></div>'
      + '<div><span style="color:var(--text-muted)">อะไหล่: </span><span style="font-weight:var(--fw-semibold)">'+esc(t.parts||'—')+'</span></div>'
      + '<div><span style="color:var(--text-muted)">เวลาทำงาน: </span><span style="font-weight:var(--fw-semibold)">'+esc(t.work_hours||'—')+' ชม.</span></div>'
      + '<div style="margin-top:6px;display:flex;align-items:center;gap:8px;color:var(--accent-strong);font-weight:var(--fw-bold)"><span style="width:8px;height:8px;border-radius:999px;background:var(--accent)"></span>ปิดงานแล้ว · '+esc(t.resolved_at)+'</div>'
      + '</div></div>';
  }

  var html = '<div class="glass" style="padding:22px 24px;display:flex;flex-direction:column;gap:12px"><div class="eyebrow">การดำเนินงาน</div>';

  if (sk === 'pending'){
    html += '<button class="btn-primary" style="padding:14px;font-size:.96rem;width:100%" onclick="doAssignTicket(\''+esc(t.id)+'\')">✔ รับงานซ่อม</button>';
  }

  if (sk === 'inprogress'){
    html += '<div style="background:var(--warning-soft);border:1px solid rgba(179,132,44,0.22);border-radius:var(--radius-md);padding:10px 13px;font-size:.84rem;font-weight:var(--fw-semibold);color:var(--warning)">ซ่อมเองไม่ได้? ส่งต่อบริษัทภายนอก</div>'
      + '<input class="field" style="padding:12px 14px;font-size:.88rem" placeholder="ระบุชื่อบริษัท / รายละเอียด…" value="'+esc(S.resolveForm.vendorNote)+'" oninput="S.resolveForm.vendorNote=this.value">'
      + '<button style="border:1px solid var(--warning);background:var(--warning-soft);border-radius:999px;padding:12px;font-size:.9rem;font-weight:var(--fw-semibold);cursor:pointer;color:var(--warning);width:100%" onclick="doOutsourceTicket(\''+esc(t.id)+'\')">ส่งต่อบริษัท →</button>'
      + '<div style="border-top:1px solid var(--line);padding-top:12px;font-size:.82rem;color:var(--text-muted);font-weight:var(--fw-semibold)">หรือซ่อมเสร็จแล้ว — กรอกสรุปแล้วปิดงาน</div>';
  }

  if (sk === 'outsourced'){
    html += '<div style="background:var(--warning-soft);border:1px solid rgba(179,132,44,0.22);border-radius:var(--radius-md);padding:10px 13px;font-size:.84rem;font-weight:var(--fw-semibold);color:var(--warning)">บริษัทแก้ไขเสร็จแล้ว — กรอกสรุปแล้วปิดงาน</div>';
  }

  if (sk === 'inprogress' || sk === 'outsourced'){
    html += '<textarea class="field" rows="2" style="padding:12px 14px;font-size:.88rem;resize:none" placeholder="วิธีแก้ไข / สรุปผลการซ่อม…" oninput="S.resolveForm.solution=this.value">'+esc(S.resolveForm.solution)+'</textarea>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
      + '<input class="field" style="padding:12px 14px;font-size:.88rem" placeholder="อะไหล่ที่ใช้" value="'+esc(S.resolveForm.parts)+'" oninput="S.resolveForm.parts=this.value">'
      + '<input class="field" style="padding:12px 14px;font-size:.88rem" placeholder="เวลา (ชม.)" type="number" min="0" value="'+esc(S.resolveForm.hours)+'" oninput="S.resolveForm.hours=this.value">'
      + '</div>'
      + '<button class="btn-primary" style="padding:14px;font-size:.96rem;width:100%" onclick="doResolveTicket(\''+esc(t.id)+'\',\''+sk+'\')">'
      + (sk === 'outsourced' ? '✔ ปิดงาน (บริษัทแก้ไขแล้ว)' : '✔ ปิดงาน (ซ่อมเสร็จ)')
      + '</button>';
  }

  html += '</div>';
  return html;
}

function doAssignTicket(ticketId){
  var payload = { ticketId: ticketId, techName: S.displayName, changedBy: S.displayName };
  if (hasBackend()){
    google.script.run
      .withSuccessHandler(function(){ toastMsg('รับงาน '+ticketId+' แล้ว'); refreshTickets(); })
      .withFailureHandler(function(){ toastMsg('เกิดข้อผิดพลาด กรุณาลองใหม่'); })
      .assignTicket(payload);
  } else {
    var all = S.ticketsRaw || MOCK_TICKETS;
    var t = all.filter(function(x){ return (x.id||x.ticket_id) === ticketId; })[0];
    if (t){ t.statusKey = 'inprogress'; t.status = 'กำลังซ่อม'; t.tech = S.displayName; }
    toastMsg('รับงาน '+ticketId+' แล้ว (โหมดสาธิต)');
    setState({ screen: 'tickets' });
  }
}

function doOutsourceTicket(ticketId){
  var note = (S.resolveForm.vendorNote || '').trim();
  if (!note){ toastMsg('กรุณาระบุชื่อบริษัท / รายละเอียด'); return; }
  var payload = { ticketId: ticketId, vendorNote: note, changedBy: S.displayName };
  if (hasBackend()){
    google.script.run
      .withSuccessHandler(function(){ toastMsg('ส่งต่อบริษัทแล้ว — '+ticketId); setState({ resolveForm:{ solution:'', parts:'', hours:'', vendorNote:'' } }); refreshTickets(); })
      .withFailureHandler(function(){ toastMsg('เกิดข้อผิดพลาด กรุณาลองใหม่'); })
      .outsourceTicket(payload);
  } else {
    var all = S.ticketsRaw || MOCK_TICKETS;
    var t = all.filter(function(x){ return (x.id||x.ticket_id) === ticketId; })[0];
    if (t){ t.statusKey = 'outsourced'; t.status = 'ส่งบริษัทแล้ว'; t.solution = note; }
    toastMsg('ส่งต่อบริษัทแล้ว (โหมดสาธิต)');
    setState({ resolveForm:{ solution:'', parts:'', hours:'', vendorNote:'' }, screen:'tickets' });
  }
}

function doResolveTicket(ticketId, prevStatusKey){
  var sol = (S.resolveForm.solution || '').trim();
  if (!sol){ toastMsg('กรุณากรอกวิธีแก้ไข / สรุปผลการซ่อม'); return; }
  var payload = { ticketId: ticketId, solution: sol, parts: S.resolveForm.parts, work_hours: S.resolveForm.hours, changedBy: S.displayName, prevStatusKey: prevStatusKey };
  if (hasBackend()){
    google.script.run
      .withSuccessHandler(function(){ toastMsg('ปิดงาน '+ticketId+' เรียบร้อยแล้ว'); setState({ resolveForm:{ solution:'', parts:'', hours:'', vendorNote:'' } }); refreshTickets(); })
      .withFailureHandler(function(){ toastMsg('เกิดข้อผิดพลาด กรุณาลองใหม่'); })
      .resolveTicket(payload);
  } else {
    var all = S.ticketsRaw || MOCK_TICKETS;
    var t = all.filter(function(x){ return (x.id||x.ticket_id) === ticketId; })[0];
    if (t){ t.statusKey = 'resolved'; t.status = 'ปิดงานแล้ว'; t.solution = sol; t.parts = S.resolveForm.parts; t.work_hours = S.resolveForm.hours; t.resolved_at = 'ตอนนี้'; }
    toastMsg('ปิดงาน '+ticketId+' เรียบร้อยแล้ว (โหมดสาธิต)');
    setState({ resolveForm:{ solution:'', parts:'', hours:'', vendorNote:'' }, screen:'tickets' });
  }
}

/* ============================================================
   QR + SCAN LANDING
   ============================================================ */
function scanUrlFor(assetId){
  if (LIFF_ID) return 'https://liff.line.me/' + LIFF_ID + '?asset=' + encodeURIComponent(assetId);
  return (location.origin + location.pathname) + '?asset=' + encodeURIComponent(assetId);
}
function qrBox(assetId){
  var src = 'https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=0&data=' + encodeURIComponent(scanUrlFor(assetId));
  return '<div style="width:140px;height:140px;padding:11px;background:#fff;border:1px solid var(--line);border-radius:16px;display:flex;align-items:center;justify-content:center"><img src="'+src+'" alt="QR '+esc(assetId)+'" style="width:100%;height:100%;object-fit:contain"></div>';
}

function routeScan(assetId){
  S.scanAsset = assetId;
  if (hasBackend()){
    setState({ scanLoading:true });
    google.script.run
      .withSuccessHandler(handleScanResult)
      .withFailureHandler(function(){ setState({ scanLoading:false, screen:'dashboard' }); toastMsg('โหลดข้อมูลอุปกรณ์ไม่สำเร็จ'); })
      .getAssetEntry(assetId);
  } else {
    var mock   = MOCK_TICKETS.filter(function(t){ return (t.dev||'').indexOf(assetId) === 0; });
    var active = mock.filter(function(t){ return t.statusKey !== 'resolved'; })[0];
    handleScanResult({ ok:true, asset:{ id:assetId, name:(mock[0] ? mock[0].dev.split(' · ')[1] : assetId), location:(mock[0]?mock[0].place:'') }, activeTicket: active || null });
  }
}
function handleScanResult(res){
  S.scanLoading = false;
  if (!res || !res.ok){ toastMsg((res && res.error) || 'ไม่พบอุปกรณ์'); setState({ screen:'dashboard' }); return; }
  if (res.activeTicket){
    // มีงานที่ยังไม่ปิด → ไปหน้าสถานะของงานนั้น
    S.scanAssetInfo = res.asset;
    setState({ screen:'detail', activeTicketId:res.activeTicket.id });
    return;
  }
  setState({ scanAssetInfo:res.asset, category:'', desc:'', attach:0, screen:'scan' });
}

function viewScanLanding(){
  var a = S.scanAssetInfo || { id:S.scanAsset, name:'', brand:'', model:'', location:'' };
  var canSubmit = S.desc.trim().length > 0;
  var detail = function(label, val){
    if (!val) return '';
    return '<div style="display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--line)"><span style="color:var(--text-muted);font-size:.84rem">'+esc(label)+'</span><span style="font-weight:var(--fw-semibold);font-size:.88rem;text-align:right">'+esc(val)+'</span></div>';
  };

  return '<section style="animation:riseIn .6s var(--ease) both"><div style="max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:14px">'
    + '<div class="glass" style="padding:18px 20px">'
    +   '<div style="display:flex;align-items:center;gap:13px;margin-bottom:12px">'
    +     '<div style="width:44px;height:44px;flex:0 0 auto;border-radius:12px;background:var(--grad-tint-pine);border:1px solid rgba(37,102,91,0.2);display:flex;align-items:center;justify-content:center;font-size:1.3rem">📷</div>'
    +     '<div style="flex:1;min-width:0"><div class="eyebrow" style="color:var(--accent-strong)">สแกน QR สำเร็จ</div>'
    +       '<div style="font-weight:var(--fw-bold);font-size:1.05rem;line-height:1.3">'+esc(a.name||a.id)+'</div></div>'
    +   '</div>'
    +   '<div style="display:flex;flex-direction:column">'
    +     detail('รหัสอุปกรณ์', a.id)
    +     detail('ยี่ห้อ', a.brand)
    +     detail('รุ่น', a.model)
    +     detail('สถานที่ติดตั้ง', a.location)
    +   '</div>'
    + '</div>'
    + '<div class="glass" style="padding:20px;display:flex;flex-direction:column;gap:14px">'
    +   '<div style="display:grid;gap:8px"><label class="label">รายละเอียดอาการที่พบ</label>'
    +     '<textarea class="field" rows="4" oninput="S.desc=this.value;refreshScanSubmit()" placeholder="อธิบายอาการที่พบ เช่น เปิดไม่ติด มีเสียงดัง จอไม่แสดงภาพ…">'+esc(S.desc)+'</textarea></div>'
    +   '<button id="scan-submit" class="btn-primary" style="width:100%;font-size:1rem;padding:15px" '+(canSubmit?'':'disabled')+' onclick="submitScanReport()">ส่งคำขอแจ้งซ่อม</button>'
    +   '<div id="scan-hint" style="font-size:.82rem;color:var(--text-muted);text-align:center">'+(canSubmit?'พร้อมส่งข้อมูลแล้ว':'กรอกรายละเอียดอาการก่อนส่ง')+'</div>'
    + '</div></section>';
}
function refreshScanSubmit(){
  var can = S.desc.trim().length > 0;
  var btn = document.getElementById('scan-submit'), hint = document.getElementById('scan-hint');
  if (btn) btn.disabled = !can;
  if (hint) hint.textContent = can ? 'พร้อมส่งข้อมูลแล้ว' : 'กรอกรายละเอียดอาการก่อนส่ง';
}

/* แจ้งซ่อมจากการสแกน — ไม่ต้องเลือกประเภท (รู้จากอุปกรณ์ที่สแกนแล้ว) */
function submitScanReport(){
  if (!S.desc.trim()) return;
  var a = S.scanAssetInfo || {};
  var payload = { category:'', desc:S.desc.trim(), asset_id:a.id, place:a.location||'',
                  requester_id:S.lineUserId, requester_name:S.displayName };
  if (hasBackend()){
    google.script.run
      .withSuccessHandler(function(res){
        toastMsg('เปิดงานซ่อมแล้ว • หมายเลขงาน ' + (res && res.id ? res.id : ''));
        setState({ desc:'', screen:(S.role==='staff'?'mytickets':'tickets') });
        refreshTickets();
      })
      .withFailureHandler(function(){ toastMsg('บันทึกงานซ่อมไม่สำเร็จ กรุณาลองใหม่'); })
      .createTicket(payload);
  } else {
    toastMsg('เปิดงานซ่อมแล้ว (โหมดสาธิต)');
    setState({ desc:'', screen:'mytickets' });
  }
}

/* ============================================================
   BOOT
   ============================================================ */
function loadBootData(cb){
  if (!hasBackend()){ S.loading = false; if (cb) cb(); return; }
  google.script.run
    .withSuccessHandler(function(data){
      S.ticketsRaw = (data && data.tickets) || null;
      S.loanRaw    = (data && data.loans) || null;
      if (data && data.devices && data.devices.length)
        S.deviceRegistry = data.devices.map(function(d){ return { id:String(d.id), name:String(d.name) }; });
      S.loading = false; if (cb) cb(); render();
    })
    .withFailureHandler(function(){ S.loading = false; if (cb) cb(); render(); })
    .getBootData();
}

function boot(){
  S.scanAsset = ASSET_PARAM || '';

  if (liffEnabled()){
    S.booting = true; render();
    liff.init({ liffId: LIFF_ID }).then(function(){
      if (!liff.isLoggedIn()){ liff.login(); return; }
      return liff.getProfile().then(function(p){
        LINE.userId = p.userId; LINE.profile = p;
        google.script.run
          .withSuccessHandler(function(res){
            S.booting = false;
            if (res && res.ok){
              S.loggedIn = true; S.displayName = res.name || p.displayName;
              S.role = res.role || 'staff'; S.department = res.department || '';
              S.lineUserId = res.userID || p.userId;
              loadBootData(function(){
                if (S.scanAsset) routeScan(S.scanAsset);
                else { S.screen = 'dashboard'; render(); }
                fetchAlerts();
              });
            } else if (res && res.noAccess){ S.noAccess = true; render(); }
            else { S.needRegister = true; render(); }
          })
          .withFailureHandler(function(){ S.booting = false; toastMsg('เชื่อมต่อระบบไม่สำเร็จ'); render(); })
          .loginByLine(p.userId);
      });
    }).catch(function(){ S.booting = false; toastMsg('เริ่ม LINE LIFF ไม่สำเร็จ'); render(); });
  } else {
    /* โหมดสาธิต — แสดงหน้าเลือกบทบาท */
    S.booting = false;
    loadBootData();
    render();
  }
  render();
}
boot();
</script>
